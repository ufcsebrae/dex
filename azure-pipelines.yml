trigger:
  branches:
    include:
    - master # Mantém o gatilho na master, ou mude para main se a TI migrou a branch principal

pool:
  vmImage: ubuntu-latest

# Conecta ao grupo de variáveis oficial da TI para herdar o token de deploy válido
variables:
- group: Azure-Static-Web-Apps-delightful-coast-0b4493810-variable-group

steps:
  - task: Checkout@1
    inputs:
      repository: self
      submodules: true

  - task: AzureStaticWebApp@0
    inputs:
      azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN_DELIGHTFUL_COAST_0B4493810)
      app_location: "/docs"
      api_location: ""
      output_location: ""
      skip_app_build: true
    displayName: 'Publicar ufc.sebraesp.com.br (Pulso + DEX)'
